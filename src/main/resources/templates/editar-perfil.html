<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar perfil - HealthApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800">
<main class="max-w-md mx-auto mt-12 px-4">
    <div class="mb-6">
        <a href="/paciente/perfil" class="text-sm font-medium text-indigo-600 hover:text-indigo-800">&larr; Cancelar y volver</a>
        <h1 class="text-3xl font-extrabold text-slate-900 mt-1 tracking-tight">Modificar perfil</h1>
    </div>

    <div class="bg-white rounded-xl shadow border border-slate-200 p-6">
        <form th:action="@{/paciente/editar}" method="POST" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold uppercase text-slate-500 mb-1">Nombre</label>
                <input type="text" name="nombre" th:value="${nombre}" class="w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-sm shadow-sm focus:border-indigo-500 focus:outline-none" required />
            </div>

            <div class="pt-4 border-t border-slate-100 flex justify-end">
                <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-md text-sm font-medium shadow-sm uppercase">actualizar perfil</button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
