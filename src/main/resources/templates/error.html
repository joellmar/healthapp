<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error del sistema - HealthApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex items-center justify-center px-4">
<div class="max-w-md w-full bg-white rounded-xl shadow-md border border-slate-200 p-8 text-center">
    <div class="inline-flex items-center justify-center h-16 w-16 rounded-full bg-red-100 text-red-600 mb-4">
        <svg class="h-10 w-10" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
    </div>

    <h1 class="text-4xl font-black text-slate-900 tracking-tight" th:text="${'Error ' + (status != null ? status : '500')}">Error 500</h1>
    <h2 class="text-lg font-bold text-slate-800 mt-2" th:text="${errorTitle != null ? errorTitle : 'Problema inesperado'}">Aviso del sistema</h2>
    <p class="text-sm text-slate-500 mt-2 bg-slate-50 border border-slate-200 p-3 rounded-lg text-left font-mono break-words" th:text="${errorMessage != null ? errorMessage : 'No se ha podido procesar la petición debido a un conflicto interno.'}">Detalle del fallo.</p>

    <div class="mt-6 grid grid-cols-2 gap-4">
        <a href="javascript:history.back()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2 rounded-md text-sm font-medium border border-slate-300 uppercase">volver atrás</a>
        <a href="/login" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-md text-sm font-medium shadow-sm uppercase">ir al login</a>
    </div>
</div>
</body>
</html>
