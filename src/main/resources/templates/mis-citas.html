<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Mis citas - HealthApp</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800">
<main class="max-w-6xl mx-auto mt-12 px-4">
  <div class="flex justify-between items-center mb-8">
    <div>
      <a href="/home" class="text-sm font-medium text-indigo-600 hover:text-indigo-800">&larr; Volver al inicio</a>
      <h1 class="text-3xl font-extrabold text-slate-900 mt-1 tracking-tight">Listado de citas médicas</h1>
    </div>
    <a href="/citas/nueva" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-md text-sm font-medium shadow-sm uppercase">solicitar nueva cita</a>
  </div>

  <div class="bg-white rounded-xl shadow border border-slate-200 p-6 mb-8">
    <form method="GET" action="/citas/mis-citas" class="grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
      <div>
        <label class="block text-xs font-semibold uppercase text-slate-500 mb-1">filtrar por estado</label>
        <select name="estadoFiltro" class="w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-sm shadow-sm focus:border-indigo-500 focus:outline-none">
          <option value="">Todos los estados</option>
          <option value="PROGRAMADA">Programada</option>
          <option value="CANCELADA">Cancelada</option>
          <option value="REALIZADA">Realizada</option>
        </select>
      </div>
      <div>
        <label class="block text-xs font-semibold uppercase text-slate-500 mb-1">filtrar por fecha</label>
        <input type="date" name="fechaFiltro" class="w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-sm shadow-sm focus:border-indigo-500 focus:outline-none" />
      </div>
      <button type="submit" class="bg-slate-800 hover:bg-slate-900 text-white px-4 py-2 rounded-md text-sm font-medium shadow-sm uppercase">aplicar filtros</button>
    </form>
  </div>

  <div class="bg-white shadow rounded-xl border border-slate-200 overflow-hidden">
    <table class="min-w-full divide-y divide-slate-200">
      <thead class="bg-slate-50">
      <tr>
        <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Fecha y hora</th>
        <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Especialidad</th>
        <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Médico / Contacto</th>
        <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Estado</th>
        <th class="px-6 py-3 text-right text-xs font-semibold text-slate-500 uppercase tracking-wider">Acciones</th>
      </tr>
      </thead>
      <tbody class="bg-white divide-y divide-slate-200">
      <tr th:each="cita : ${citas}">
        <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-900">
          <span th:text="${cita.fecha}">2026-05-20</span> a las <span th:text="${cita.hora}">10:00</span>
        </td>
        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-slate-900" th:text="${cita.especialidad}">Cardiología</td>
        <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-500" th:text="${cita.medicoEmail}">medico@correo.com</td>
        <td class="px-6 py-4 whitespace-nowrap">
                            <span th:class="${cita.estado.name() == 'PROGRAMADA' ? 'px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800' : (cita.estado.name() == 'CANCELADA' ? 'px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-red-100 text-red-800' : 'px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-slate-100 text-slate-800')}" th:text="${cita.estado}">
                                PROGRAMADA
                            </span>
        </td>
        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium space-x-2">
          <a th:href="@{/citas/detalle/{id}(id=${cita.id})}" class="text-indigo-600 hover:text-indigo-900">Detalles</a>
          <a th:if="${cita.estado.name() == 'PROGRAMADA'}" th:href="@{/citas/editar/{id}(id=${cita.id})}" class="text-amber-600 hover:text-amber-900">Editar</a>
          <form th:if="${cita.estado.name() == 'PROGRAMADA'}" th:action="@{/citas/cancelar/{id}(id=${cita.id})}" method="POST" class="inline">
            <button type="submit" class="text-red-600 hover:text-red-900 font-medium">Cancelar</button>
          </form>
        </td>
      </tr>
      <tr th:if="${#lists.isEmpty(citas)}">
        <td colspan="5" class="px-6 py-10 text-center text-sm text-slate-500">
          No se han encontrado citas con los criterios de filtrado seleccionados.
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</main>
</body>
</html>
